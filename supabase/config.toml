# Supabase configuration for Civiq project

project_id = "civiq"

[api]
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public"]

[db]
port = 54322

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["https://*.supabase.co"]
jwt_expiry = 604800 # 7 days in seconds

[storage]
enabled = true

[functions.gemini-tag]
verify_jwt = false

[functions.escalate-issues]
verify_jwt = false

[functions.check-duplicate]
verify_jwt = true

